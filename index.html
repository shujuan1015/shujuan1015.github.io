<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .profile {
            background: #fff;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .profile img {
            float: left;
            margin-right: 20px;
            border-radius: 50%;
            width: 150px;
        }
        .profile h2 {
            margin-top: 0;
        }
        .profile p {
            text-align: justify;
        }
        .clear {
            clear: both;
        }
    </style>
</head>
<body>

<header>
    <h1>個人簡介</h1>
</header>

<div class="container">
    <div class="profile">
        <img src="profile-pic.jpg" alt="個人照片">
        <h2>姓名: 張三</h2>
        <p>你好！我是一位軟體開發者，擁有五年以上的工作經驗，專注於Web開發和移動應用開發。我熱衷於學習新技術，並致力於將創新的解決方案應用於實際問題中。我的專業技能包括JavaScript、Python、HTML、CSS，以及框架如React和Node.js。</p>
        <p>在工作之外，我喜歡旅行、攝影和學習新語言。目前，我正在學習日語，目標是能夠流利地進行日常對話。</p>
        <p>如果你對技術開發或其他任何話題感興趣，歡迎隨時聯繫我！</p>
        <div class="clear"></div>
    </div>
</div>

</body>
</html>
