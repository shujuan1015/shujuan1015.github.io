<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-header img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
        }
        .profile-header h1 {
            margin: 10px 0;
        }
        .profile-content {
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <img src="profile.jpg" alt="個人照片">
            <h1>你的名字</h1>
            <p>你的職業</p>
        </div>
        <div class="profile-content">
            <h2>關於我</h2>
            <p>這裡是你的個人簡介。你可以寫一些關於你的背景、興趣、技能和經驗。</p>
            <h2>聯絡方式</h2>
            <p>電子郵件: your.email@example.com</p>
            <p>電話: 123-456-7890</p>
        </div>
    </div>
</body>
</html>
